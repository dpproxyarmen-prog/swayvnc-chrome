name: Push Image to GHCR
permissions:
  contents: read
  packages: write
on:
  push:
    branches:
      - main
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  push-store-image:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@main

      - name: "Login to GitHub Container Registry"
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - name: "Build and Push Image"
        run: |
          docker build . --tag ghcr.io/dpproxyarmen-prog/swayvnc-chrome:latest
          docker push ghcr.io/dpproxyarmen-prog/swayvnc-chrome:latest
